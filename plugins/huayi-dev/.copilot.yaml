# Copilot compatibility configuration
# This file is source input for on-demand Copilot export.
# Run: python scripts/sync-skills.py --target copilot --output-dir <path> --skill huayi-dev

commands:
  - name: huayi-db
    description: Config-aware MySQL inspection and safe queries
    script: scripts/huayi_db.py
    args:
      - --database-config
      - --config
      - list-instances
      - list-schemas
      - list-tables
      - describe-table
      - sample-data
      - query
      - export-schema
      - export-data
      - --instance
      - --db
      - --database
      - --table
      - --limit
      - --json
