# Copilot skill configuration
# This file is the source of truth for Copilot commands generation.

commands:
  - name: huayi-db
    description: Config-aware MySQL inspection and safe queries
    script: scripts/huayi_db.py
    args:
      - --database-config
      - --config
      - list-instances
      - list-schemas
      - list-tables
      - describe-table
      - sample-data
      - query
      - export-schema
      - export-data
      - --instance
      - --db
      - --database
      - --table
      - --limit
      - --json
