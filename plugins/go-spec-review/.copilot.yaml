# Copilot compatibility configuration
# This file is source input for on-demand Copilot export.
# Run: python scripts/sync-skills.py --target copilot --output-dir <path> --skill go-spec-review

commands:
  - name: go-collect
    description: 收集 Go 项目上下文信息（go.mod、构建约束、变更文件）
    script: scripts/collect_context.go
    args:
      - --repo
      - --base
      - --head
      - --max-files

  - name: go-risk
    description: 扫描 Go 代码中的 spec 风险区域
    script: scripts/risk_sweep.go
    args:
      - --repo
      - --base
      - --head

  - name: go-check
    description: 轻量级 Go 代码检查
    script: scripts/light_checks.go
    args:
      - --repo
